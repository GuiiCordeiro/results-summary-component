<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>Frontend Mentor | Results summary component</title>
  <script src="https://kit.fontawesome.com/8369836d54.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main>
      <div class="results">
        <h3>Your Result</h3>
        <div class="number">
          <span>76</span>
          <p>of 100</p>
        </div>
        <h2>Great</h2>
        <p>You scored higher than 65% of the people who have taken these tests.</p>
      </div>

      <div class="summary">
        <h3>Summary</h3>
        <div class="skills">
          <div class="skill reaction"><i class="fa-solid fa-bolt"></i>Reaction 80 / 100</div>
          <div class="skill brain"><i class="fa-solid fa-brain"></i>Brain 92 / 100</div>
          <div class="skill verbal"><i class="fa-regular fa-comment"></i>Verbal 61 / 100</div>
          <div class="skill visual"><i class="fa-solid fa-eye"></i>Visual 73 / 100</div>
        </div>

        <button>Continue</button>
      </div>
  </main>
</body>
</html>
